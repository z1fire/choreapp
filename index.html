<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4CAF50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Track the chores you do, when you do them">
  <title>ChoreApp</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>

  <!-- Install Banner -->
  <div id="install-banner" class="install-banner install-banner--hidden">
    <span class="install-text">Add ChoreApp to your home screen!</span>
    <button type="button" id="install-btn">Install</button>
    <button type="button" id="install-dismiss" class="dismiss" aria-label="Dismiss">×</button>
  </div>

  <!-- Header -->
  <header class="header">
    <div>
      <h1>ChoreApp</h1>
      <div class="header-sub">Tap a chore to log it</div>
    </div>
    <button type="button" class="edit-btn" id="edit-btn">Edit</button>
  </header>

  <!-- Home View: Chore Grid -->
  <main class="view" id="view-home">
    <div class="chore-grid" id="chore-grid"></div>
  </main>

  <!-- History View -->
  <section class="view" id="view-history" hidden>
    <div class="history-header">
      <h2>History</h2>
      <div class="history-actions">
        <button type="button" class="small-btn" id="export-btn">⬇ Export</button>
        <button type="button" class="small-btn" id="import-btn">⬆ Import</button>
      </div>
    </div>
    <input type="file" id="import-input" class="hidden-input" accept=".json">
    <div id="history-list"></div>
  </section>

  <!-- FAB -->
  <button type="button" class="fab" id="fab" aria-label="Add chore">+</button>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button type="button" class="nav-tab active" data-view="home">
      <span class="nav-icon">🏠</span>
      Home
    </button>
    <button type="button" class="nav-tab" data-view="history">
      <span class="nav-icon">📋</span>
      History
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ── Library / Add Chore Modal ── -->
  <div class="modal-overlay" id="add-modal" role="dialog" aria-modal="true" aria-label="Add chore">
    <div class="modal modal-library">
      <div class="library-modal-header">
        <div class="modal-handle"></div>
        <div class="library-title-row">
          <h2>Add Chore</h2>
          <button type="button" class="done-btn" id="close-library">Done</button>
        </div>
        <div class="library-search-wrap">
          <input
            type="search"
            id="library-search"
            placeholder="Search or type a custom chore…"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>
      </div>
      <div class="library-list" id="library-list"></div>
      <div class="custom-add-wrap" id="custom-add-wrap"></div>
    </div>
  </div>

  <!-- ── Note Modal ── -->
  <div class="modal-overlay" id="note-modal" role="dialog" aria-modal="true" aria-label="Add note">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Add Note</h2>
      <p class="note-chore-label" id="note-chore-label"></p>
      <textarea
        id="note-input"
        class="note-textarea"
        placeholder="e.g. Used new cleaner, only did half the load…"
        rows="4"
        maxlength="500"
      ></textarea>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="cancel-note">Skip</button>
        <button type="button" class="btn btn-primary" id="save-note">Save Note</button>
      </div>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
